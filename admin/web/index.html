<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="BillRaja Admin Dashboard">
  <meta name="theme-color" content="#173FB4">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="billraja_admin">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>BillRaja Admin</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #f8fbff 0%, #eef4ff 45%, #f4f7fb 100%);
      font-family: "Inter", "Segoe UI", sans-serif;
    }

    #loading-shell {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .loading-card {
      width: min(440px, 100%);
      padding: 32px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.86);
      box-shadow: 0 28px 70px rgba(15, 23, 42, 0.10);
      border: 1px solid rgba(226, 232, 240, 0.8);
      backdrop-filter: blur(12px);
    }

    .loading-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(37, 99, 255, 0.08);
      color: #173fb4;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .loading-badge::before {
      content: "";
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 0 6px rgba(34, 197, 94, 0.12);
    }

    .loading-title {
      margin: 18px 0 10px;
      color: #0f172a;
      font-size: 34px;
      line-height: 1.05;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .loading-copy {
      margin: 0 0 22px;
      color: #64748b;
      font-size: 15px;
      line-height: 1.65;
    }

    .loading-bar {
      width: 100%;
      height: 10px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(37, 99, 255, 0.10);
    }

    .loading-bar span {
      display: block;
      width: 38%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #173fb4 0%, #52b2ff 100%);
      animation: pulse-slide 1.15s ease-in-out infinite;
    }

    @keyframes pulse-slide {
      0% { transform: translateX(-110%); }
      100% { transform: translateX(340%); }
    }
  </style>

  <div id="loading-shell">
    <div class="loading-card">
      <div class="loading-badge">BillRaja Admin</div>
      <h1 class="loading-title">Launching the command center.</h1>
      <p class="loading-copy">Loading growth insights, collections health, team operations, and admin tools.</p>
      <div class="loading-bar"><span></span></div>
    </div>
  </div>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script>
    window.addEventListener("flutter-first-frame", function () {
      const loader = document.getElementById("loading-shell");
      if (loader) loader.remove();
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
